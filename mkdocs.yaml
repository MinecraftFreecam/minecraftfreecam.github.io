site_name: Freecam
site_url: https://minecraftfreecam.github.io
# edit_uri_template: https://github.com/MinecraftFreecam/minecraftfreecam.github.io/blob/main/{path}
dev_addr: localhost:8080
use_directory_urls: true
docs_dir: src
strict: true

nav:
  - Home: index.md
  - Modrinth: https://modrinth.com/mod/freecam/
  - CurseForge: https://www.curseforge.com/minecraft/mc-mods/free-cam
  - GitHub: https://github.com/MinecraftFreecam/Freecam
  - Issues: https://github.com/MinecraftFreecam/Freecam/issues

hooks:
  - freecam_files.py

markdown_extensions:
  - toc:
      permalink: true
      separator: "_"

theme:
  name: material
  logo: images/icon_mono.svg
  favicon: images/icon.svg
  features:
    - navigation.tabs
    - navigation.top
    - toc.follow
    - toc.integrate
  palette:
    # Palette toggle for automatic mode
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode

    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
