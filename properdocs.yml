site_name: Freecam
site_url: https://minecraftfreecam.github.io
repo_url: https://github.com/MinecraftFreecam/Freecam
edit_uri_template: https://github.com/MinecraftFreecam/minecraftfreecam.github.io/blob/main/{path}
dev_addr: localhost:8080
use_directory_urls: true
docs_dir: src
strict: true

nav:
  - Home: index.md
  - config.md
  - Modrinth: https://modrinth.com/mod/freecam/
  - CurseForge: https://www.curseforge.com/minecraft/mc-mods/free-cam
  - Issues: https://github.com/MinecraftFreecam/Freecam/issues

hooks:
  - freecam_files.py

watch:
  - overrides

extra_css:
  - style/palette.css
  - style/extra.css

markdown_extensions:
  - toc:
      permalink: true
      separator: "_"

plugins:
  - privacy:
      links_attr_map:
        target: _blank
  - search

theme:
  name: materialx
  custom_dir: overrides
  favicon: images/icon.svg
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tabs
    - navigation.top
    - toc.follow
    - toc.integrate
    - search.suggest
  topbar_style: glass
  palette:
    # Palette toggle for automatic mode
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode

    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: freecam
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: freecam
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
